<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profesyonel Rulet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4a843;
  --gold-light: #f0c96a;
  --gold-dark: #9a7420;
  --red: #c0392b;
  --green-num: #1a6b2c;
  --bg: #0a1a0e;
  --felt: #0f2318;
  --felt2: #122a1c;
  --surface: #1a2820;
  --surface2: #1f3028;
  --border: #2a4030;
  --border-gold: rgba(212,168,67,0.3);
  --text: #e8e0d0;
  --text-muted: #7a9a80;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── TABLE ── */
#table {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 50%, #1a3d24 0%, #0a1a0e 80%);
  background-image:
    radial-gradient(ellipse at 50% 50%, #1c4228 0%, #0a1a0e 75%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 12px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 12px);
}

/* felt border ring */
#table::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 2px solid rgba(212,168,67,0.25);
  border-radius: 28px;
  pointer-events: none;
}
#table::after {
  content: '';
  position: absolute;
  inset: 18px;
  border: 1px solid rgba(212,168,67,0.1);
  border-radius: 24px;
  pointer-events: none;
}

/* ── CENTER AREA ── */
#center {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  z-index: 10;
}

#game-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#wheel {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 7px solid var(--gold);
  box-shadow: 0 0 50px rgba(212,168,67,0.3), 0 0 100px rgba(212,168,67,0.1), inset 0 0 30px rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 62px;
  font-weight: 900;
  transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 1.0);
}

.color-green { background: radial-gradient(circle at 35% 30%, #2a9040, var(--green-num)); color: #fff; }
.color-red   { background: radial-gradient(circle at 35% 30%, #e04040, var(--red)); color: #fff; }
.color-black { background: radial-gradient(circle at 35% 30%, #2a2a2a, #0a0a0a); color: #fff; }

#spin-btn {
  padding: 13px 50px;
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
  color: #1a0e00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(212,168,67,0.4);
  transition: all 0.25s;
  text-transform: uppercase;
}
#spin-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(212,168,67,0.55);
}
#spin-btn:active { transform: translateY(0); }
#spin-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

/* settings btn */
#settings-btn {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  padding: 9px 24px;
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 3px;
  background: rgba(212,168,67,0.1);
  color: var(--gold);
  border: 1px solid var(--border-gold);
  border-radius: 50px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  z-index: 20;
}
#settings-btn:hover { background: rgba(212,168,67,0.2); }

/* ── HISTORY ── */
#history {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
  max-width: 280px;
}

#history span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-weight: 700;
  font-size: 0.75rem;
  font-family: 'Cinzel', serif;
  border: 1.5px solid rgba(255,255,255,0.1);
}
#history span.red   { background: var(--red); }
#history span.black { background: #1a1a1a; border-color: #444; }
#history span.green { background: var(--green-num); }

/* ── PLAYER CORNER CARDS ── */
.player-corner {
  position: fixed;
  width: 300px;
  background: rgba(15, 35, 22, 0.92);
  border: 1px solid var(--border-gold);
  border-radius: 16px;
  padding: 14px;
  backdrop-filter: blur(8px);
  z-index: 10;
  transition: box-shadow 0.4s;
}

.player-corner.win-flash {
  animation: flash-win 0.6s ease 2;
}

/* corners */
.corner-0 { top: 24px;    left: 24px;    border-top-left-radius: 20px; }
.corner-1 { top: 24px;    right: 24px;   border-top-right-radius: 20px; }
.corner-2 { bottom: 70px; left: 24px;    border-bottom-left-radius: 20px; }
.corner-3 { bottom: 70px; right: 24px;   border-bottom-right-radius: 20px; }

.p-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-gold);
}

.p-name {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--gold);
}

.p-balance {
  background: rgba(212,168,67,0.12);
  border: 1px solid var(--border-gold);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--gold-light);
  font-family: 'Cinzel', serif;
}

.p-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: flex-end;
  margin-bottom: 8px;
}

.p-controls label {
  font-size: 0.66rem;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.p-controls select,
.p-controls input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 7px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.p-controls select:focus,
.p-controls input:focus { border-color: var(--gold); }
.p-controls select { width: 120px; }
.p-controls input[type="number"] { width: 68px; }

.bet-value {
  border-color: var(--border-gold) !important;
  color: var(--gold-light) !important;
  font-weight: 700;
  width: 72px !important;
}

/* chips */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.chip-add, .chip-sub {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid;
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.62rem;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chip-add {
  background: radial-gradient(circle at 35% 35%, #2a7a3f, #0d4a1e);
  border-color: #3db85e;
  color: #a8ffbe;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
}
.chip-add:hover {
  transform: scale(1.15) translateY(-2px);
  box-shadow: 0 5px 14px rgba(61,184,94,0.45);
  border-color: #6de08a;
}

.chip-sub {
  background: radial-gradient(circle at 35% 35%, #8a1a1a, #4a0a0a);
  border-color: #c0392b;
  color: #ffaaaa;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
}
.chip-sub:hover {
  transform: scale(1.15) translateY(-2px);
  box-shadow: 0 5px 14px rgba(192,57,43,0.45);
  border-color: #e05050;
}
.chip-add:active, .chip-sub:active { transform: scale(0.95); }

.chips-sep {
  width: 1px; height: 30px;
  background: var(--border-gold);
  margin: 0 2px;
  align-self: center;
}

/* ── MODAL ── */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

#modal {
  background: var(--felt2);
  border: 1px solid var(--border-gold);
  border-radius: 20px;
  padding: 30px 36px;
  width: 480px;
  max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(212,168,67,0.1);
}

#modal h2 {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  font-weight: 900;
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 24px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.setup-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(212,168,67,0.12);
}
.setup-row:last-of-type { border-bottom: none; }

.setup-label {
  font-family: 'Cinzel', serif;
  font-size: 0.82rem;
  color: var(--gold);
  min-width: 90px;
}

.setup-row input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-family: 'Lato', sans-serif;
  font-size: 0.88rem;
  outline: none;
  flex: 1;
  transition: border-color 0.2s;
}
.setup-row input:focus { border-color: var(--gold); }

#modal-start-btn {
  display: block;
  width: 100%;
  margin-top: 22px;
  padding: 13px;
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 3px;
  background: linear-gradient(135deg, #1a4a2a, #2d7a45, #1a4a2a);
  color: #a8ffbe;
  border: 1px solid #3db85e;
  border-radius: 50px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.25s;
  box-shadow: 0 3px 16px rgba(61,184,94,0.25);
}
#modal-start-btn:hover {
  background: linear-gradient(135deg, #235c35, #3a9453, #235c35);
  box-shadow: 0 6px 24px rgba(61,184,94,0.4);
  transform: translateY(-1px);
}

@keyframes flash-win {
  0%   { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
  50%  { box-shadow: 0 0 0 8px rgba(212,168,67,0.5); }
  100% { box-shadow: 0 0 0 0 rgba(212,168,67,0); }
}

/* ── DECORATIVE CORNERS ── */
.deco-corner {
  position: fixed;
  width: 60px; height: 60px;
  pointer-events: none;
  opacity: 0.4;
  z-index: 5;
}
.deco-corner svg { width: 100%; height: 100%; }
.deco-tl { top: 28px; left: 28px; }
.deco-tr { top: 28px; right: 28px; transform: scaleX(-1); }
.deco-bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
.deco-br { bottom: 28px; right: 28px; transform: scale(-1); }
</style>
</head>
<body>

<div id="table"></div>

<!-- decorative corners -->
<div class="deco-corner deco-tl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 8 Q2 2 8 2 L58 2" stroke="#d4a843" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#d4a843"/></svg></div>
<div class="deco-corner deco-tr"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 8 Q2 2 8 2 L58 2" stroke="#d4a843" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#d4a843"/></svg></div>
<div class="deco-corner deco-bl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 8 Q2 2 8 2 L58 2" stroke="#d4a843" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#d4a843"/></svg></div>
<div class="deco-corner deco-br"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 8 Q2 2 8 2 L58 2" stroke="#d4a843" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#d4a843"/></svg></div>

<!-- CENTER -->
<div id="center">
  <div id="game-title">🎰 Profesyonel Rulet</div>
  <div id="wheel" class="color-green">0</div>
  <div id="history"></div>
  <button id="spin-btn" onclick="spin()">ÇEVİR</button>
</div>

<!-- 4 CORNER PLAYER CARDS -->
<div id="p0" class="player-corner corner-0"></div>
<div id="p1" class="player-corner corner-1"></div>
<div id="p2" class="player-corner corner-2"></div>
<div id="p3" class="player-corner corner-3"></div>

<!-- SETTINGS BUTTON -->
<button id="settings-btn" onclick="openModal()">⚙ Oyuncu Ayarları</button>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>♦ Oyuncu Kurulumu</h2>
    <div id="setup-rows"></div>
    <button id="modal-start-btn" onclick="startGame()">Oyunu Başlat</button>
  </div>
</div>

<script>
const colors = {
  0:'green',1:'red',2:'black',3:'red',4:'black',5:'red',6:'black',7:'red',
  8:'black',9:'red',10:'black',11:'black',12:'red',13:'black',14:'red',
  15:'black',16:'red',17:'black',18:'red',19:'red',20:'black',21:'red',
  22:'black',23:'red',24:'black',25:'red',26:'black',27:'red',28:'black',
  29:'black',30:'red',31:'black',32:'red',33:'black',34:'red',35:'black',36:'red'
};

let players = [];
let history = [];
const CHIPS_ADD = [1, 2, 4, 8, 16, 32, 64, 128];
const CHIPS_SUB = [1, 2, 4, 8];

/* ── MODAL ── */
function buildSetupRows() {
  let h = '';
  const defaults = ['Oyuncu 1','Oyuncu 2','Oyuncu 3','Oyuncu 4'];
  for (let i = 0; i < 4; i++) {
    h += `
    <div class="setup-row">
      <span class="setup-label">Oyuncu ${i+1}</span>
      <input id="n${i}" value="${defaults[i]}" placeholder="İsim" style="flex:1.5">
      <input id="m${i}" type="number" value="500" placeholder="Para" style="flex:0.8;max-width:90px">
    </div>`;
  }
  document.getElementById('setup-rows').innerHTML = h;
}

function openModal() {
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

/* click outside closes */
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this && players.length > 0) closeModal();
});

function startGame() {
  players = [];
  for (let i = 0; i < 4; i++) {
    players.push({
      name: document.getElementById('n'+i).value || ('Oyuncu '+(i+1)),
      balance: +document.getElementById('m'+i).value || 500
    });
  }
  closeModal();
  renderAllPlayers();
}

/* ── PLAYER CARDS ── */
function renderAllPlayers() {
  players.forEach((p, i) => renderPlayer(i));
}

function renderPlayer(i) {
  const p = players[i];
  const addBtns = CHIPS_ADD.map(v =>
    `<button class="chip-add" title="+${v}" onclick="chip(${i},${v})">+${v}</button>`
  ).join('');
  const subBtns = CHIPS_SUB.map(v =>
    `<button class="chip-sub" title="-${v}" onclick="chip(${i},-${v})">-${v}</button>`
  ).join('');

  document.getElementById('p'+i).innerHTML = `
    <div class="p-header">
      <span class="p-name">♠ ${p.name}</span>
      <span class="p-balance" id="bal${i}">₺ ${p.balance}</span>
    </div>
    <div class="p-controls">
      <label>Tür
        <select id="type${i}">
          <option value="red">🔴 Kırmızı</option>
          <option value="black">⚫ Siyah</option>
          <option value="odd">🔢 Tek</option>
          <option value="even">🔢 Çift</option>
          <option value="low">📉 1–18</option>
          <option value="high">📈 19–36</option>
          <option value="d1">① 1.Düzine</option>
          <option value="d2">② 2.Düzine</option>
          <option value="d3">③ 3.Düzine</option>
          <option value="number">🎯 Sayı</option>
        </select>
      </label>
      <label>Sayı
        <input id="num${i}" type="number" min="0" max="36" value="0">
      </label>
      <label>Bahis ₺
        <input id="bet${i}" type="number" value="0" min="0" class="bet-value">
      </label>
    </div>
    <div class="chips">
      ${addBtns}
      <div class="chips-sep"></div>
      ${subBtns}
    </div>`;
}

function chip(i, v) {
  const b = document.getElementById('bet'+i);
  let nv = (+b.value) + v;
  if (nv < 0) nv = 0;
  if (nv > players[i].balance) nv = players[i].balance;
  b.value = nv;
}

function win(type, num, res, color) {
  if (type === 'red')    return color === 'red';
  if (type === 'black')  return color === 'black';
  if (type === 'odd')    return res !== 0 && res % 2 === 1;
  if (type === 'even')   return res !== 0 && res % 2 === 0;
  if (type === 'low')    return res >= 1  && res <= 18;
  if (type === 'high')   return res >= 19 && res <= 36;
  if (type === 'd1')     return res >= 1  && res <= 12;
  if (type === 'd2')     return res >= 13 && res <= 24;
  if (type === 'd3')     return res >= 25 && res <= 36;
  if (type === 'number') return res === num;
  return false;
}

function spin() {
  if (players.length === 0) { openModal(); return; }
  const spinBtn = document.getElementById('spin-btn');
  spinBtn.disabled = true;

  const wheel = document.getElementById('wheel');
  let angle = 1800 + Math.random() * 720;
  wheel.style.transform = 'rotate(' + angle + 'deg)';

  setTimeout(() => {
    const result = Math.floor(Math.random() * 37);
    const color  = colors[result];

    wheel.className = 'color-' + color;
    wheel.textContent = result;

    players.forEach((p, i) => {
      const bet = +document.getElementById('bet'+i).value;
      if (bet <= 0) return;
      if (bet > p.balance) { alert(p.name + ': yetersiz bakiye!'); return; }

      p.balance -= bet;
      const type = document.getElementById('type'+i).value;
      const num  = +document.getElementById('num'+i).value;

      if (win(type, num, result, color)) {
        const mult = type === 'number' ? 36 : (type==='d1'||type==='d2'||type==='d3') ? 3 : 2;
        p.balance += bet * mult;
        const card = document.getElementById('p'+i);
        card.classList.remove('win-flash');
        void card.offsetWidth;
        card.classList.add('win-flash');
      }

      document.getElementById('bal'+i).textContent = '₺ ' + p.balance;
      document.getElementById('bet'+i).value = 0;
    });

    history.unshift({ n: result, c: color });
    history = history.slice(0, 14);
    document.getElementById('history').innerHTML =
      history.map(x => `<span class="${x.c}">${x.n}</span>`).join('');

    spinBtn.disabled = false;
  }, 4000);
}

/* init */
buildSetupRows();
</script>
</body>
</html>
